[package]
name = "ykman-cli"
version = "0.1.0"
edition = "2024"
description = "YubiKey Manager CLI (Rust)"
license = "BSD-2-Clause"

[[bin]]
name = "ykman"
path = "src/main.rs"

[dependencies]
yubikit = { path = "../yubikit" }
clap = { version = "4", features = ["derive"] }
chrono = "0.4"
getrandom = "0.3"
hex = "0.4.3"
base64 = "0.22.1"
log = { version = "0.4", features = ["std"] }
elliptic-curve = { version = "0.13", features = ["pkcs8", "sec1"] }
p256 = { version = "0.13", features = ["pkcs8"] }
p384 = { version = "0.13", features = ["pkcs8"] }
sha2 = "0.10"
rpassword = "7"
x509-cert = { version = "0.2.5", features = ["pem"] }
aes-gcm = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "6"

[target.'cfg(target_os = "linux")'.dependencies]
keyring = { version = "3", features = ["sync-secret-service", "crypto-rust"] }

[target.'cfg(target_os = "macos")'.dependencies]
keyring = { version = "3", features = ["apple-native"] }

[target.'cfg(target_os = "windows")'.dependencies]
keyring = { version = "3", features = ["windows-native"] }

[target.'cfg(not(any(target_os = "linux", target_os = "macos", target_os = "windows")))'.dependencies]
keyring = "3"

[lints]
workspace = true
