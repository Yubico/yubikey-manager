[package]
name = "ykman-cli"
version = "0.1.0"
edition = "2024"
description = "YubiKey Manager CLI (Rust)"
license = "BSD-2-Clause"

[[bin]]
name = "ykman"
path = "src/main.rs"

[dependencies]
yubikit = { path = "../yubikit" }
clap = { version = "4", features = ["derive"] }
chrono = "0.4"
getrandom = "0.3"
hex = "0.4.3"
base64 = "0.22.1"
log = { version = "0.4", features = ["std"] }
p256 = "0.13"
sha2 = "0.10"

[lints]
workspace = true
