name: Ubuntu

on: [push, pull_request]

permissions: read-all

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -qq swig libpcsclite-dev libudev-dev libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install the project
        run: uv sync --locked

      - name: Run pre-commit hooks
        run: |
          uv tool install pre-commit
          pre-commit run --all-files --verbose

      - name: Run unit tests
        run: uv run pytest

      - name: Build Rust CLI
        run: |
          cargo build --release -p ykman-cli
          target/release/ykman --version
          mkdir -p rust-dist
          cp target/release/ykman rust-dist/

      - name: Upload Rust build
        uses: actions/upload-artifact@v6
        with:
          name: ykman-rust-ubuntu
          path: rust-dist

      - name: PyInstaller
        run: |
          uv run pyinstaller ykman.spec
          dist/ykman/ykman --version
          [[ -z "$(dist/ykman/ykman --version | grep -E "not found|missing")" ]]
          export REF=$(echo ${GITHUB_REF} | cut -d '/' -f 3)
          mv dist/ykman dist/ykman-$REF

      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: ykman-builds-ubuntu
          path: dist
