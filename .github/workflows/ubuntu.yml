name: Ubuntu

on: [push, pull_request]

permissions: read-all

jobs:
  rust-cli:
    runs-on: ${{ matrix.os }}
    name: Rust CLI - ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ykman-rust-linux-x64
          - os: ubuntu-arm64
            artifact: ykman-rust-linux-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -qq libpcsclite-dev libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust CLI
        run: |
          cargo build --release -p ykman-cli
          mkdir -p rust-dist
          cp target/release/ykman rust-dist/
          rust-dist/ykman --version

      - name: Upload Rust build
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: rust-dist

  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -qq swig libpcsclite-dev libudev-dev libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install the project
        run: uv sync --locked

      - name: Run pre-commit hooks
        run: |
          uv tool install pre-commit
          pre-commit run --all-files --verbose

      - name: Run unit tests
        run: uv run pytest

      - name: PyInstaller
        run: |
          uv run pyinstaller ykman.spec
          dist/ykman/ykman --version
          [[ -z "$(dist/ykman/ykman --version | grep -E "not found|missing")" ]]
          export REF=$(echo ${GITHUB_REF} | cut -d '/' -f 3)
          mv dist/ykman dist/ykman-$REF

      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: ykman-builds-ubuntu
          path: dist
