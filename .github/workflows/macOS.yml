name: macOS

on: [push, pull_request]

permissions: read-all

jobs:
  build:
    runs-on: macos-latest
    name: Build (universal)

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin aarch64-apple-darwin

      - name: Build Rust CLI (universal)
        run: |
          cargo build --release -p ykman-cli --target aarch64-apple-darwin
          cargo build --release -p ykman-cli --target x86_64-apple-darwin
          mkdir -p dist/ykman
          lipo -create \
            target/aarch64-apple-darwin/release/ykman \
            target/x86_64-apple-darwin/release/ykman \
            -output dist/ykman/ykman
          dist/ykman/ykman --version

      - name: Copy scripts
        run: cp -r resources/macos dist/scripts

      - name: Build installer
        working-directory: ./dist
        run: ./scripts/make_pkg.sh

      - name: Upload build
        uses: actions/upload-artifact@v6
        with:
          name: ykman-builds-macos
          path: dist
