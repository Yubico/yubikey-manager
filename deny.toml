[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
version = 2
ignore = [
    # rsa: Marvin Attack (timing side-channel). No fix available yet.
    # We only use RSA for PKCS#12 parsing, not in networked contexts.
    { id = "RUSTSEC-2023-0071", reason = "no patch available; only used for local PKCS#12 operations" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "Unlicense",
    "Apache-2.0 WITH LLVM-exception",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "lowest-version"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
