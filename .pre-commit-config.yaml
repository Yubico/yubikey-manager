repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.7
  hooks:
    # Run the linter, organize imports
    - id: ruff-check
      args: [ --fix ]
    # Run the formatter
    - id: ruff-format
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.19.1
  hooks:
    - id: mypy
      exclude: ^(tests/|docs/)  # keep in sync with mypy.ini
      additional_dependencies: []
- repo: https://github.com/RobertCraigie/pyright-python
  rev: v1.1.408
  hooks:
    - id: pyright
- repo: local
  hooks:
  - id: ty-check
    name: ty-check
    language: python
    entry: ty check packages/yubikit/yubikit packages/yubikey-manager/ykman tests
    pass_filenames: false
    args: [--python=.venv/]
    additional_dependencies: [ty]
  - id: cargo-fmt
    name: cargo fmt
    language: system
    entry: cargo fmt --all -- --check
    pass_filenames: false
    types: [rust]
  - id: cargo-clippy
    name: cargo clippy
    language: system
    entry: cargo clippy --workspace --all-targets -- -D warnings
    pass_filenames: false
    types: [rust]
